<div id="high-potential">
  <h3>Discover Emerging Technologies</h3>
  <div id="record-count">Loading...</div>

  <div class="filters">
    <select id="maturity-filter" disabled></select>
    <select id="profitability-filter" disabled></select>
    <select id="freecashflowtrend-filter" disabled></select>
    <select id="liquidity-filter" disabled></select>
    <select id="tradeaccessibility-filter" disabled></select>
    <select id="companycountry-filter" disabled></select>
    <select id="industry-filter" disabled></select>
    <select id="sector-filter" disabled></select>
  </div>

  <div class="table-container" id="table-container">
    <span id="placeholder">Please select filters</span>
    <table id="data-table"></table>
  </div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;400;600&display=swap');

  #high-potential {
    background: #141414;
    font-family: 'Kumbh Sans', sans-serif;
    margin: 0 auto;         /* center horizontally */
    padding: 2vw;
    color: #B8CBE2;
    max-width: 1200px;      /* match drilldown width */
    width: 100%;            /* full width inside the container */
  }

  #high-potential h3 {
    margin-bottom: 0.5em;
    font-size: 1.4rem;
    font-weight: 600;
    border-left: 4px solid #B8CBE2;
    padding-left: 10px;
  }

  #high-potential #record-count {
    margin-bottom: 1em;
    font-size: 14px;
    font-weight: 500;
  }

  /* Filters */
  #high-potential .filters {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 15px;
  }

  #high-potential select {
    -webkit-appearance: none;
    appearance: none;
    background: #1F1F21;
    color: #B8CBE2;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 8px 28px 8px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: box-shadow 0.2s ease;
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23B8CBE2' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-size: 12px;
  }

  #high-potential select:hover:not(:disabled) {
    box-shadow: 0 0 0 1px #B8CBE2, 0 0 6px #B8CBE280;
  }

  #high-potential select:disabled {
    background: #2a2a2a;
    color: #777;
    cursor: not-allowed;
  }

  /* Table container */
  #high-potential .table-container {
    width: 100%;
    height: 40px;
    overflow: hidden;
    border: 1px solid #333;
    border-radius: 10px;
    background: #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #777;
    font-size: 13px;
    transition: height 0.3s ease;
  }

  #high-potential .table-container.expanded {
    height: auto;
    max-height: 50vh;
    overflow-y: auto;
    overflow-x: auto;
    display: block;
    color: inherit;
    font-size: inherit;
  }

  /* Table */
  #high-potential table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    font-size: 13px;
    min-width: max-content;
    position: relative;
    display: none;
  }

  #high-potential th,
  #high-potential td {
    border: 1px solid #333;
    padding: 6px 10px;
    text-align: left;
    white-space: nowrap;
    max-width: 250px;
    overflow: hidden;
    height: 32px;
  }

  #high-potential th {
    background: #1e1e1e;
    color: #FFD580;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 10;
    cursor: pointer;
  }

  #high-potential td:first-child {
    position: sticky;
    left: 0;
    z-index: 300;
    background: #141414 !important;
    color: #FFD580;
    font-weight: 600;
  }

  #high-potential thead th:first-child {
    position: sticky;
    top: 0;
    left: 0;
    z-index: 400;
    background: #141414 !important;
    color: #FFD580;
  }

  #high-potential tr:nth-child(even) td:not(:first-child) {
    background-color: #1c1c1c;
  }

  #high-potential tr:hover td:not(:first-child) {
    background-color: #2a2a2a;
  }

  /* Expandable description */
  #high-potential .desc-link {
    font-size: 11px;
    color: #8BE0F3;
    cursor: pointer;
    text-decoration: underline;
  }

  #high-potential .desc-content {
    font-size: 12px;
    color: #ccc;
    margin-top: 4px;
    display: none;
    white-space: normal;
    line-height: 1.4;
  }

  #high-potential .truncate {
    display: inline-block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    vertical-align: bottom;
    -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to right, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
  }

  @media (max-width: 768px) {
    #high-potential .filters {
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    }
    #high-potential td:first-child,
    #high-potential thead th:first-child {
      max-width: 40vw;
      width: 40vw;
    }
    #high-potential .truncate {
      max-width: 40vw;
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
      mask-image: linear-gradient(to right, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
    }
    #high-potential table { font-size: 11px; }
    #high-potential th, #high-potential td { padding: 4px 6px; height: 28px; }
  }
</style>

<script>
/* (script unchanged) */
(function() {
  const apiURL = "https://marketstate-api-318171260121.us-central1.run.app/query?query=";
  const filters = [
    "maturity","profitability","freecashflowtrend","liquidity",
    "tradeaccessibility","companycountry","industry","sector"
  ];
  const allOptionFilters = ["companycountry","industry","sector"];
  const friendlyLabels = {
    companyname: "Company Name",
    sector: "Sector",
    industry: "Industry",
    companycountry: "Country",
    exchangename: "Exchange",
    firsttradedate: "First Trade Date",
    avgindustrype: "Avg Industry P/E",
    marketcapusd: "Market Cap (USD)",
    currentpriceusd: "Price (USD)",
    volumeusd: "Volume (USD)",
    trailingeps: "EPS (Trailing)",
    trailingpe: "P/E (Trailing)",
    forwardpe: "P/E (Forward)",
    ratiotrailingpe: "Relative P/E (Trailing)",
    ratioforwardpe: "Relative P/E (Forward)",
    ebitdausd: "EBITDA (USD)",
    freecashflowusd: "Free Cash Flow (USD)",
    freecashflowfraction: "Free Cash Flow Fraction",
    pct_change_1y: "Change 1Y (%)",
    pct_change_2y: "Change 2Y (%)",
    pct_change_5y: "Change 5Y (%)",
    pct_change_10y: "Change 10Y (%)"
  };

  const resultColumns = [
    "companyname","avgindustrype", "trailingpe","forwardpe","ratiotrailingpe","ratioforwardpe",
    "freecashflowusd","freecashflowfraction", "pct_change_1y","pct_change_2y","pct_change_5y","pct_change_10y",
    "marketcapusd","currentpriceusd","volumeusd","trailingeps","ebitdausd", "sector", "industry", "exchangename", "companycountry"
  ];

  let totalRecords = 0;
  let currentData = [];
  let sortState = {};
  let fetchingSummary = false;

  function updateStatus() {
    document.querySelector("#high-potential #record-count").textContent =
      `Total companies in database: ${totalRecords.toLocaleString()}`;
  }

  function formatValue(col, value) {
    if (value === null || value === undefined || value === "") return "";
    if (["marketcapusd","volumeusd","freecashflowusd","ebitdausd"].includes(col)) {
      return parseInt(value).toLocaleString();
    }
    if (["currentpriceusd","avgindustrype","trailingeps","trailingpe","forwardpe",
         "ratiotrailingpe","ratioforwardpe","freecashflowfraction"].includes(col)) {
      return parseFloat(value).toLocaleString(undefined,{maximumFractionDigits:2});
    }
    if (col.startsWith("pct_change")) {
      return parseFloat(value).toFixed(2) + "%";
    }
    return value;
  }

  function buildTableBody(data) {
    return "<tbody>" + data.map(row => {
      return "<tr>" + resultColumns.map(h => {
        if (h === "companyname") {
          return `
            <td>
              <div style="display:flex; flex-direction:column;">
                <span class="truncate">${formatValue(h, row[h])}</span>
                <span style="font-size:11px; color:#B8CBE2;">
                  ${formatValue("exchangesymbol", row.exchangesymbol)}
                </span>
                <span style="font-size:11px; color:#888;">
                  ${formatValue("industry", row.industry)}
                </span>
                <span class="desc-link" data-ticker="${row[h]}">Summary</span>
                <div class="desc-content"></div>
              </div>
            </td>`;
        }
        return `<td>${formatValue(h, row[h])}</td>`;
      }).join("") + "</tr>";
    }).join("") + "</tbody>";
  }

  function renderTable(data) {
    const container = document.querySelector("#high-potential #table-container");
    const table = document.querySelector("#high-potential #data-table");
    const placeholder = document.querySelector("#high-potential #placeholder");

    currentData = data;
    if (!data || data.length === 0) {
      container.classList.remove("expanded");
      table.style.display = "none";
      placeholder.style.display = "block";
      return;
    }

    container.classList.add("expanded");
    table.style.display = "table";
    placeholder.style.display = "none";

    let thead = "<thead><tr>";
    resultColumns.forEach(h => {
      const indicator = sortState[h] ? (sortState[h] === "asc" ? " ▲" : " ▼") : "";
      thead += `<th data-col="${h}">${friendlyLabels[h] || h}${indicator}</th>`;
    });
    thead += "</tr></thead>";

    table.innerHTML = thead + buildTableBody(data);

    // Sorting
    table.querySelectorAll("th").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.getAttribute("data-col");
        sortTableByColumn(col);
      });
    });

    // Summary links
    table.querySelectorAll(".desc-link").forEach(link => {
      link.addEventListener("click", async (e) => {
        const ticker = e.target.dataset.ticker;
        const contentDiv = e.target.nextElementSibling;
        if (contentDiv.style.display === "block") {
          contentDiv.style.display = "none";
          return;
        }
        if (fetchingSummary) return;
        fetchingSummary = true;
        e.target.textContent = "loading...";
        try {
          const sql = `SELECT businesssummary FROM prod_mart.stock_screener WHERE companyname = '${ticker}' LIMIT 1`;
          const res = await fetch(apiURL + encodeURIComponent(sql));
          const json = await res.json();
          contentDiv.textContent = json.data[0]?.businesssummary || "No summary available.";
          contentDiv.style.display = "block";
        } catch (err) {
          contentDiv.textContent = "Failed to load summary.";
          contentDiv.style.display = "block";
        } finally {
          e.target.textContent = "Summary";
          fetchingSummary = false;
        }
      });
    });
  }

  function sortTableByColumn(col) {
    const direction = sortState[col] === "asc" ? "desc" : "asc";
    sortState = { [col]: direction };
    const sorted = [...currentData].sort((a, b) => {
      const numA = parseFloat(a[col]);
      const numB = parseFloat(b[col]);
      if (!isNaN(numA) && !isNaN(numB)) {
        return direction === "asc" ? numA - numB : numB - numA;
      }
      if (col.toLowerCase().includes("date")) {
        return direction === "asc"
          ? new Date(a[col]) - new Date(b[col])
          : new Date(b[col]) - new Date(a[col]);
      }
      return direction === "asc"
        ? (a[col] || "").toString().localeCompare((b[col] || "").toString())
        : (b[col] || "").toString().localeCompare((a[col] || "").toString());
    });
    renderTable(sorted);
  }

  async function fetchTotalCount() {
    try {
      const sql = `SELECT COUNT(*) AS total FROM prod_mart.stock_screener`;
      const res = await fetch(apiURL + encodeURIComponent(sql));
      const json = await res.json();
      totalRecords = json.data[0].total;
      updateStatus();
    } catch (err) {
      document.querySelector("#high-potential #record-count").textContent = "❌ Failed to load record count.";
    }
  }

  async function populateFilter(filterName, conditions) {
    const whereClause = conditions.length ? "WHERE " + conditions.join(" AND ") : "";
    const sql = `
      SELECT ${filterName} as value, COUNT(*) as cnt
      FROM prod_mart.stock_screener
      ${whereClause}
      GROUP BY ${filterName}
      ORDER BY cnt DESC
    `;
    try {
      const res = await fetch(apiURL + encodeURIComponent(sql));
      const json = await res.json();
      const select = document.querySelector(`#high-potential #${filterName}-filter`);
      let options = `<option value="">${friendlyLabels[filterName] || filterName}</option>`;
      if (allOptionFilters.includes(filterName)) {
        const totalFilteredCount = json.data.reduce((sum, v) => sum + parseInt(v.cnt), 0);
        options += `<option value="__ALL__">All (${totalFilteredCount})</option>`;
      }
      options += json.data.map(v => {
        const label = v.value || "Unknown";
        return `<option value="${v.value}">${label} (${v.cnt})</option>`;
      }).join("");
      select.innerHTML = options;
      select.disabled = false;
    } catch {}
  }

  function setupFilters() {
    filters.forEach((f, i) => {
      const select = document.querySelector(`#high-potential #${f}-filter`);
      select.addEventListener("change", () => {
        const conditions = [];
        for (let j = 0; j <= i; j++) {
          const val = document.querySelector(`#high-potential #${filters[j]}-filter`).value;
          if (val && val !== "__ALL__") {
            conditions.push(`${filters[j]} = '${val}'`);
          }
        }
        if (i + 1 < filters.length) {
          populateFilter(filters[i + 1], conditions);
        } else {
          const whereClause = conditions.length ? "WHERE " + conditions.join(" AND ") : "";
          const sql = `
            SELECT ${resultColumns.join(", ")}, exchangesymbol
            FROM prod_mart.stock_screener
            ${whereClause}
            LIMIT 200
          `;
          fetch(apiURL + encodeURIComponent(sql))
            .then(res => res.json())
            .then(json => {
              renderTable(json.data);
              document.querySelector("#high-potential #record-count").textContent =
                `Showing ${json.data.length} results out of ${totalRecords.toLocaleString()}`;
            });
        }
      });
    });
  }

  async function applyDefaultFilters() {
    const defaults = {
      maturity: "emerging",
      profitability: "profitable",
      freecashflowtrend: "high",
      liquidity: "extreme",
      tradeaccessibility: "high",
      companycountry: "__ALL__",
      industry: "__ALL__",
      sector: "__ALL__"
    };
    for (let i = 0; i < filters.length; i++) {
      const f = filters[i];
      const select = document.querySelector(`#high-potential #${f}-filter`);
      if (defaults[f]) {
        await new Promise(r => setTimeout(r, 300));
        select.value = defaults[f];
        select.dispatchEvent(new Event("change"));
      }
    }
  }

  function init() {
    fetchTotalCount();
    setupFilters();
    populateFilter("maturity", []);
    applyDefaultFilters();
  }

  if (document.readyState !== "loading") init();
  else document.addEventListener("DOMContentLoaded", init);
})();
</script>
