models:
- name: stg_dates
  config:
    schema: stg_prod
  description: |-
    Vanilla date spine generated by dbt (no upstream source tables).
  columns:
  - name: date_key
    description: Surrogate date key in YYYYMMDD format.
    data_type: int64
  - name: date
    description: Calendar date.
    data_type: date
  - name: year
    description: Calendar year.
    data_type: int64
  - name: month
    description: Calendar month (1-12).
    data_type: int64
  - name: quarter
    description: Calendar quarter (1-4).
    data_type: int64
  - name: day
    description: Day of month (1-31).
    data_type: int64
  - name: day_of_week
    description: "Day of week (BigQuery: 1=Sunday..7=Saturday)."
    data_type: int64

- name: stg_country_financial_periods
  config:
    schema: stg_prod
  description: |-
    Country-level fiscal periods (annual/quarterly) for macro reporting (heuristic).
  columns:
  - name: period_sk
    description: Stable hash key of country_code + period_type + period_end_date.
    tests:
    - not_null
    - unique
    data_type: string
  - name: country_code
    description: Country ISO alpha-2 code.
    tests:
    - not_null
    data_type: string
  - name: period_type
    description: Period type (annual or quarterly).
    tests:
    - not_null
    data_type: string
  - name: period_end_date
    description: Financial period end date.
    tests:
    - not_null
    data_type: date
  - name: fiscal_year
    description: Fiscal year label.
    data_type: int64
  - name: fiscal_quarter
    description: Fiscal quarter (1-4).
    data_type: int64
  - name: period_label
    description: Human-readable period label.
    data_type: string

# NOTE: No sources here; use existing `raw` source definitions (e.g. `models/income_statements/config_income_statements.yml`).
