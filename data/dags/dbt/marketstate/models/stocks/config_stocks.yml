models:
- name: stg_stocks
  config:
    schema: stg_prod
  description: Latest Yahoo Finance stock metadata snapshot per symbol. {{ doc('stg_stocks') }}
  columns:
  - name: stg_stocks_sk
    description: Surrogate key derived from exchange_symbol, capture_date, yf_symbol, and company_name.
    data_type: STRING
    tests:
    - unique
    - not_null
  - name: exchangeSymbol
    description: Exchange-specific symbol; primary key.
    data_type: STRING
  - name: captureDate
    description: Snapshot capture date; primary key.
    data_type: DATE
  - name: yfSymbol
    description: Yahoo Finance symbol; primary key.
    data_type: STRING
  - name: address
    description: Concatenated address from address1, address2, city, and zip.
    data_type: STRING
  - name: companyCountry
    description: Company country.
    data_type: STRING
  - name: companyName
    description: Company name; primary key.
    data_type: STRING
  - name: website
    description: Company website URL.
    data_type: STRING
  - name: companyOfficers
    description: Company officers.
    data_type: STRING
  - name: sector
    description: Business sector.
    data_type: STRING
  - name: industry
    description: Industry within sector.
    data_type: STRING
  - name: longBusinessSummary
    description: Long business summary.
    data_type: STRING
  - name: exchange
    description: Exchange name.
    data_type: STRING
  - name: companyCurrency
    description: Financial reporting currency, uppercased.
    data_type: STRING
  - name: exchangeCurrency
    description: Trading currency, uppercased.
    data_type: STRING
  - name: fiveYearAvgDividendYield
    description: Five-year average dividend yield.
    data_type: STRING
  - name: fullTimeEmployees
    description: Full-time employee count, cast to integer.
    data_type: INT64
  - name: sharesOutstanding
    description: Shares outstanding, cast to integer.
    data_type: INT64
  - name: lastDividendValue
    description: Last dividend value, cast to float.
    data_type: FLOAT64
  - name: lastDividendDate
    description: Last dividend date, converted from epoch seconds.
    data_type: DATE
  - name: lastFiscalYearEndDate
    description: Last fiscal year end date, converted from epoch seconds.
    data_type: DATE
  - name: firstTradeDate
    description: First trade date, converted from epoch seconds.
    data_type: DATE
  - name: marketIdentifierCode
    description: Market identifier code.
    data_type: STRING
  
