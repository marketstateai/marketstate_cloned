models:
- name: stg_market_segments
  config:
    schema: stg_prod
  description: Aggregated market segment research metrics by year, including summary
    stats and sources. Generated by the `researcher` tool in `marketstate/researcher`,
    which runs web search via SearxNG and summarizes with Ollama (or another configured
    model).
  columns:
  - name: market_segment
    description: Market segment name used as the research input.
  - name: market_segment_description
    description: Plain-English summary of the market segment and growth drivers.
  - name: market_size_2025_busd_mean
    description: Mean of 2025 market size estimates in billions of USD.
  - name: market_size_2030_busd_mean
    description: Mean of 2030 market size estimates in billions of USD.
  - name: market_size_2025_busd_median
    description: Median of 2025 market size estimates in billions of USD.
  - name: market_size_2030_busd_median
    description: Median of 2030 market size estimates in billions of USD.
  - name: market_size_2025_busd_std
    description: Standard deviation of 2025 market size estimates in billions of USD.
  - name: market_size_2030_busd_std
    description: Standard deviation of 2030 market size estimates in billions of USD.
  - name: market_size_2025_busd_estimates_count
    description: Count of 2025 market size estimates used in the aggregation.
  - name: market_size_2030_busd_estimates_count
    description: Count of 2030 market size estimates used in the aggregation.
  - name: sources
    description: Comma-separated source URLs backing the estimates.
  - name: estimated_yearly_cagr_mean
    description: Mean estimated yearly CAGR (percent) derived from 2025 and 2030 estimates.
  - name: estimated_yearly_cagr_median
    description: Median estimated yearly CAGR (percent) derived from 2025 and 2030
      estimates.
sources:
- name: raw
  description: Raw source tables in BigQuery.
  database: general-428410
  schema: src_prod
  tables:
  - name: market_segments
    description: Market segment size estimates and source metadata.
