name: Test Data DAGs

on:
  pull_request:
    paths:
      - "data/**"
      - ".github/workflows/test-data-dags.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      AIRFLOW_HOME: ${{ github.workspace }}/data/.airflow
      AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/data/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow.db
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            data/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data/requirements.txt pytest "apache-airflow==2.10.5"

      - name: Run tests
        working-directory: data
        run: pytest -q tests/dags
