name: Deploy GCP Cloud Function

on:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/core/apis/currency-api
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Check formatting
        run: uvx ruff format --check .
      - name: Lint
        run: uvx ruff check .
      - name: Type check
        run: uvx mypy app
      - name: Security scan (Bandit)
        run: uvx bandit -r app
      - name: Dependency audit
        run: uvx pip-audit
      - name: Run tests
        run: uv run pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy function
        uses: google-github-actions/deploy-cloud-functions@v3
        with:
          name: ${{ secrets.GCP_FUNCTION_NAME }}
          runtime: python313
          region: ${{ secrets.GCP_REGION }}
          source_dir: services/core/apis/currency-api
          entry_point: currency_api
          trigger_http: true
          allow_unauthenticated: true
          env_vars: |
            ENV=prod
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            RATE_LIMIT_PER_MINUTE=${{ secrets.RATE_LIMIT_PER_MINUTE }}
            SEED_ON_STARTUP=false

      - name: Purge Cloudflare cache (optional)
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        if: ${{ env.CLOUDFLARE_ZONE_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          curl -L -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'
