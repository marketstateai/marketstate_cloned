name: Deploy Currency API (Terraform)

on:
  workflow_dispatch:

concurrency:
  group: currency-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID || 'general-428410' }}
      GCP_REGION: us-central1
      SERVICE_NAME: marketstate-currency-api
      ARTIFACT_REPO: marketstate-api
      SOURCE_DIR: services/core/apis/currency-api
      TF_DIR: ops/infra/terraform/gcp/currency-api-cloudrun

    steps:
      - uses: actions/checkout@v4

      - name: Validate GCP credentials secret
        env:
          GCP_AUTH_JSON: ${{ secrets.GCP_FUNCTION_SA || secrets.GCP_COMPUTE_KEY }}
        run: |
          if [[ -z "${GCP_AUTH_JSON:-}" ]]; then
            echo "Missing required secret: GCP_FUNCTION_SA (or fallback GCP_COMPUTE_KEY)"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_FUNCTION_SA || secrets.GCP_COMPUTE_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}"
          IMAGE_URL="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/${SERVICE_NAME}:${IMAGE_TAG}"

          gcloud artifacts repositories describe "${ARTIFACT_REPO}" \
            --location="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${ARTIFACT_REPO}" \
            --repository-format=docker \
            --location="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}"

          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t "${IMAGE_URL}" \
            "${SOURCE_DIR}"

          echo "IMAGE_URL=${IMAGE_URL}" >> "$GITHUB_ENV"

      - name: Terraform Apply
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="${TF_DIR}" init -input=false

          terraform -chdir="${TF_DIR}" import \
            'google_cloud_run_v2_service.currency_api' \
            "projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/services/${SERVICE_NAME}" || true

          terraform -chdir="${TF_DIR}" import \
            'google_cloud_run_v2_service_iam_member.public_invoker' \
            "projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/services/${SERVICE_NAME} roles/run.invoker allUsers" || true

          terraform -chdir="${TF_DIR}" apply -auto-approve \
            -var-file=terraform.tfvars \
            -var="image_url=${IMAGE_URL}"

      - name: Smoke Test
        shell: bash
        run: |
          SERVICE_URL="$(terraform -chdir="${TF_DIR}" output -raw service_url)"
          curl -fsSL -H "x-api-token: dev-token-change-me" "${SERVICE_URL}/api/v1/currencies" >/dev/null
          echo "Deployed URL: ${SERVICE_URL}"
