name: Deploy Currency Cloud Function

on:
  workflow_dispatch:

concurrency:
  group: currency-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID || 'general-428410' }}
      GCP_REGION: us-central1
      GCP_FUNCTION_NAME: ${{ vars.GCP_FUNCTION_NAME || secrets.GCP_FUNCTION_NAME || 'currency-api' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate GCP credentials secret
        env:
          GCP_AUTH_JSON: ${{ secrets.GCP_FUNCTION_SA || secrets.GCP_COMPUTE_KEY }}
        run: |
          if [[ -z "${GCP_AUTH_JSON:-}" ]]; then
            echo "Missing required secret: GCP_FUNCTION_SA (or fallback GCP_COMPUTE_KEY)"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_FUNCTION_SA || secrets.GCP_COMPUTE_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - id: deploy
        name: Deploy Cloud Function (Gen2)
        uses: google-github-actions/deploy-cloud-functions@v4
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          name: ${{ env.GCP_FUNCTION_NAME }}
          region: ${{ env.GCP_REGION }}
          runtime: python313
          source_dir: services/core/apis/currency-api
          entry_point: currency_api

      - name: Smoke test function URL
        run: |
          curl -fsSL "${{ steps.deploy.outputs.url }}" >/dev/null
          echo "Deployed URL: ${{ steps.deploy.outputs.url }}"
