name: Deploy Core Web Portal to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "apps/core/web/**"
      - ".github/workflows/core-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-core-web
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static portal artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/core/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
